<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Agua y Presión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #048553; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
        }
        h2 { margin-bottom: 25px; color: #00d2ff; }
        
        /* --- Estilos del Login --- */
        #login-contenedor {
            background-color: #068554;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #login-contenedor img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 50%;
        }
        .form-grupo {
            width: 100%;
            margin-bottom: 15px;
        }
        .form-grupo label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-grupo input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #413b3b;
            color: #fff;
        }
        #mensaje-error {
            color: #ff3333;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
            font-weight: bold;
        }

        /* --- Panel de Control --- */
        #dashboard-contenedor {
            display: none; /* Oculto hasta iniciar sesión */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .dashboard { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .card { 
            background-color: #068554; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.664); 
            width: 350px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        /* --- Botones --- */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        .btn-login { background-color: #00d2ff; color: #048553; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-login:hover { background-color: #008ca6; }
        .btn-toggle { background-color: #008cba; color: white; margin-bottom: 5px; }
        .btn-toggle:hover { background-color: #007399; }
        .btn-aplicar { background-color: #4CAF50; color: white; }
        .btn-aplicar:hover { background-color: #45a049; }

        /* --- Luces Testigos --- */
        .alarm-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .indicador-luz { width: 70px; height: 70px; border-radius: 50%; background-color: #555; box-shadow: inset 0 3px 8px rgba(255,255,255,0.3), 0 0 10px rgba(255, 255, 255, 0.5); margin-bottom: 15px; transition: background-color 0.3s, box-shadow 0.3s; }
        .indicador-luz.rojo-on { background-color: #ff3333; box-shadow: inset 0 3px 8px rgba(255,255,255,0.4), 0 0 20px #ff0000; }
        .indicador-luz.verde-on { background-color: #33cc33; box-shadow: inset 0 3px 8px rgba(255,255,255,0.4), 0 0 20px #00cc00; } 
        
        /* --- Manómetros Digitales --- */
        .gauge-wrapper { position: relative; width: 200px; height: 120px; margin-bottom: 15px; }
        .gauge-body { width: 200px; height: 100px; border-radius: 200px 200px 0 0; background: #08a2c9; overflow: hidden; position: relative; }
        .gauge-fill { position: absolute; top: 0; left: 0; width: 200px; height: 100px; border-radius: 200px 200px 0 0; background: linear-gradient(to right, #131414, #030303); transform-origin: center bottom; transform: rotate(0deg); transition: transform 0.5s ease; }
        .gauge-cover { width: 140px; height: 70px; border-radius: 140px 140px 0 0; background-color: #2d2d2d; position: absolute; bottom: 0; left: 30px; }
        .gauge-text { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: #ddd; }
        
        .control-grupo { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { width: 80px; padding: 5px; border-radius: 5px; border: 1px solid #555; background: #413b3b; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <!-- Formulario de Login -->
    <div id="login-contenedor">
        <img src="logo.png" alt="Logo">
        <h2>Iniciar Sesión</h2>
        <div class="form-grupo">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" placeholder="Ingresa tu usuario">
        </div>
        <div class="form-grupo">
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" placeholder="Ingresa tu clave">
        </div>
        <div id="mensaje-error">Usuario o contraseña incorrectos.</div>
        <button class="btn btn-login" onclick="validarLogin()">Ingresar</button>
    </div>

    <!-- Panel de Control (Oculto hasta loguearse) -->
    <div id="dashboard-contenedor">
        <h2>Panel de Monitoreo</h2>
        <div class="dashboard">
            <!-- Panel de Alarma y Manómetro 1 -->
            <div class="card">
                <h3>Sistema 1</h3>
                <hr style="width:100%; margin: 15px 0; border-color:#444;">
                <div class="alarm-container">
                    <div class="indicador-luz" id="luz-alarma-1"></div>
                    <span>Nivel de Agua Bajo</span>
                    <button class="btn btn-toggle" onclick="toggleAlarma(1)">Activar/Apagar Alarma</button>
                </div>
                <hr style="width:100%; margin: 15px 0; border-color:#444;">
                <div class="gauge-wrapper">
                    <div class="gauge-body">
                        <div class="gauge-fill" id="fill-1"></div>
                        <div class="gauge-cover"></div>
                    </div>
                    <div class="gauge-text" id="valor-display-1">0.0 bar</div>
                </div>
                <div class="control-grupo">
                    <input type="number" id="input-bar-1" min="0" max="10" step="0.1" placeholder="0-10">
                    <button class="btn btn-aplicar" onclick="actualizarManometro(1)">Aplicar Presión</button>
                </div>
            </div>

            <!-- Panel de Alarma y Manómetro 2 -->
            <div class="card">
                <h3>Sistema 2</h3>
                <hr style="width:100%; margin: 15px 0; border-color:#444;">
                <div class="alarm-container">
                    <div class="indicador-luz" id="luz-alarma-2"></div>
                    <span>Nivel de Agua Bajo</span>
                    <button class="btn btn-toggle" onclick="toggleAlarma(2)">Activar/Apugar Alarma</button>
                </div>
                <hr style="width:100%; margin: 15px 0; border-color:#444;">
                <div class="gauge-wrapper">
                    <div class="gauge-body">
                        <div class="gauge-fill" id="fill-2"></div>
                        <div class="gauge-cover"></div>
                    </div>
                    <div class="gauge-text" id="valor-display-2">0.0 bar</div>
                </div>
                <div class="control-grupo">
                    <input type="number" id="input-bar-2" min="0" max="10" step="0.1" placeholder="0-10">
                    <button class="btn btn-aplicar" onclick="actualizarManometro(2)">Aplicar Presión</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Login
        function validarLogin() {
            const usuarioIngresado = document.getElementById('usuario').value;
            const claveIngresada = document.getElementById('clave').value;
            
            if (usuarioIngresado === 'mav' && claveIngresada === '1234_mav') {
                document.getElementById('login-contenedor').style.display = 'none';
                document.getElementById('dashboard-contenedor').style.display = 'flex';
            } else {
                document.getElementById('mensaje-error').style.display = 'block';
            }
        }

        // Lógica de alarmas
        function toggleAlarma(numero) {
            const luz = document.getElementById(`luz-alarma-${numero}`);
            luz.classList.toggle('rojo-on');
        } 

        // Lógica de manómetros
        function actualizarManometro(numero) {
            const inputVal = document.getElementById(`input-bar-${numero}`).value;
            const display = document.getElementById(`valor-display-${numero}`);
            
            // Convertir a número y asegurar límites (0 a 10)
            let presion = parseFloat(inputVal);
            if (isNaN(presion)) presion = 0;
            if (presion < 0) presion = 0;
            if (presion > 10) presion = 10;
            
            // Calcular la rotación (0 bar = 0 grados, 10 bar = 180 grados)
            const grados = presion * 18; 
            
            // Actualizar la aguja y el texto
            if(numero === 1){
                document.getElementById('fill-1').style.transform = `rotate(${grados}deg)`;
            } else {
                document.getElementById('fill-2').style.transform = `rotate(${grados}deg)`;
            }
            display.innerText = `${presion.toFixed(1)} bar`;
        }
    </script>
    
</body>
</html>
